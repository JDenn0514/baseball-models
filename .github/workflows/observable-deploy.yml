name: Deploy Auction Analysis (Observable Framework)

on:
  push:
    branches: [main]
    paths:
      - "reports/auction-observable/**"
      - "reports/auction_analysis_2026_d3.html"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: reports/auction-observable/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: reports/auction-observable

      - name: Cache Observable data loader outputs
        uses: actions/cache@v4
        with:
          path: reports/auction-observable/src/.observablehq/cache
          key: observable-data-${{ hashFiles('reports/auction-observable/src/data/**', 'reports/auction_analysis_2026_d3.html') }}

      - name: Build
        run: npm run build
        working-directory: reports/auction-observable

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: reports/auction-observable/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
