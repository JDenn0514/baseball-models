name: Deploy (Observable Framework)

on:
  push:
    branches: [main]
    paths:
      - "site/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Cache Observable data loader outputs
        uses: actions/cache@v4
        with:
          path: site/src/.observablehq/cache
          key: observable-data-${{ hashFiles('site/src/data/**') }}

      - name: Build
        run: npm run build
        working-directory: site

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
